---
event_model_prior:
    dirichlet_process:
        parameters:
            concentration:
                value:      10.0
                estimate:   true
                prior:
                    gamma_distribution:
                        shape: 4.0
                        scale: 2.5

event_time_prior:
    uniform_distribution:
        min:
            value: 0.0
            estimate: false
        max:
            value: 0.1
            estimate: true
            prior:
                uniform_distribution:
                    min: 0.0
                    max: 0.2

mcmc_settings:
    chain_length: 60000
    sample_frequency: 40

operator_settings:
    auto_optimize: true
    auto_optimize_delay: 400
    operators:
        ModelOperator:
            number_of_auxiliary_categories: 2

global_comparison_settings:
    ploidy: 2
    genotypes_are_diploid: false
    markers_are_dominant: false
    population_name_delimiter: "-"
    population_name_is_prefix: true
    constant_sites_removed: false
    equal_population_sizes: true
    parameters:
        population_size:
            value: 0.0005
            estimate: true
            prior:
                gamma_distribution:
                    shape: 10.0
                    mean: 0.0005
        freq_1:
            value: 0.5
            estimate: false
        mutation_rate:
            value: 1.0
            estimate: false

comparisons:
